<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loading…</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<div id="app">
  <div id="page-post" class="page active">
    <div class="post-page">

      <div class="post-back">
        <button class="back-btn" onclick="history.back()">
          <svg width="14" height="10" viewBox="0 0 14 10" fill="none">
            <path d="M5 1L1 5M1 5L5 9M1 5H13" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
          </svg>
          <span id="back-btn-name">Back</span>
        </button>
      </div>

      <header class="post-header">
        <div class="post-header-meta">
          <span class="post-date"     id="post-date"></span>
          <span class="post-location" id="post-location"></span>
        </div>
        <h1 class="post-title"        id="post-title"></h1>
        <p  class="post-excerpt-lead" id="post-excerpt-lead"></p>
      </header>

      <div class="post-cover" id="post-cover"></div>

      <article class="post-body" id="post-body"></article>

      <div class="post-footer">
        <div class="post-footer-tags" id="post-footer-tags"></div>
        <button class="post-footer-back" onclick="history.back()">&#8592; Back</button>
      </div>

      <div class="related-posts" id="related-posts" style="display:none;">
        <h3 class="related-posts-heading">Related</h3>
        <div class="related-posts-grid" id="related-posts-grid"></div>
      </div>

    </div>

    <footer class="site-footer">
      <div class="footer-inner">
        <span class="footer-name" id="footer-name-post"></span>
        <div class="footer-links">
          <a href="#" id="footer-email-post">Email</a>
          <a href="#" id="footer-linkedin-post" target="_blank" rel="noopener">LinkedIn</a>
          <a href="#" id="footer-github-post" target="_blank" rel="noopener">GitHub</a>
        </div>
      </div>
    </footer>
  </div>
</div>

<script type="module" src="js/post.js"></script>
</body>
</html>
